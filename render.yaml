services:
  - type: web
    name: pregunta-especial
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-invitation.txt
    startCommand: uvicorn app.invitation_main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_FROM_NAME
        value: Una pregunta especial
      - key: TARGET_EMAIL
        value: saulofct222@gmail.com
